<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>norsiwel readers retreat</title>

<meta name="description" content="norsiwel readers retreat: stories, PDFs, and audiobooks by Ron Lewis.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8c2f39">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Retreat">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Mobile redirect: phone/tablet → mobile.html (skip if ?desktop=1 or ?app=1) -->
<script>
(function(){
  var p=new URLSearchParams(location.search);
  if(!p.has('desktop')&&!p.has('app')){
    var mob=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||window.innerWidth<768;
    if(mob) location.replace('./mobile.html');
  }
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:sans-serif;
  background:#efe2c2;
}

#sidebar{
  width:320px;
  padding:20px;
  box-sizing:border-box;
  background:#eadbb8;
  border-right:1px solid #cdbb96;
  display:flex;
  flex-direction:column;
}

h1{
  margin-top:0;
  margin-bottom:12px;
}

.clone-btn{
  width:100%;
  padding:9px;
  margin-bottom:12px;
  background:#8c2f39;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.clone-btn:hover{
  background:#6b242c;
}

input,select{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  box-sizing:border-box;
}

#list{
  overflow-y:auto;
  flex:1;
  border-top:1px solid #cdbb96;
}

.item{
  display:block;
  padding:10px;
  border-bottom:1px solid #cdbb96;
  cursor:pointer;
}

.item:hover,.active{
  background:rgba(255,255,255,.35);
}

.meta{
  font-size:.8em;
  color:#6f5d49;
}

#reader{
  flex:1;
  overflow-y:auto;
  padding:40px;
  background:
    linear-gradient(rgba(24,17,12,0.45), rgba(24,17,12,0.45)),
    url("library-bg.png");
  background-size:cover;
  background-position:center;
  color:#f4ead7;
}

#content{
  max-width:900px;
  margin:auto;
  background:rgba(45,35,25,0.65);
  padding:30px;
  border-radius:10px;
}

.file-list{
  max-height:300px;
  overflow-y:auto;
  padding-left:18px;
  line-height:1.4;
  margin-top:10px;
  column-count:2;
  column-gap:30px;
}

.file-list li{
  break-inside:avoid;
  margin-bottom:4px;
}

.file-list a{
  color:#f3d7a0;
  text-decoration:none;
  font-size:.9rem;
}

.file-list a:hover{
  text-decoration:underline;
}

.bot-links{
  margin-top:30px;
  font-size:.9rem;
  opacity:.9;
}

button{
  padding:6px 12px;
  margin-bottom:10px;
}

/* ── Mobile app mode: hide desktop layout ── */
body.app-mode #sidebar,
body.app-mode #reader{
  display:none;
}

/* ── Mobile story list ── */
#mob-list-view{
  display:none;
  position:fixed;
  inset:0;
  z-index:100;
  background:#18110c;
  color:#f4ead7;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;
  flex-direction:column;
}

body:not(.app-mode) #mob-list-view{
  display:none !important;
}

#mob-list-head{
  padding:
    max(16px,env(safe-area-inset-top))
    max(16px,env(safe-area-inset-right))
    12px
    max(16px,env(safe-area-inset-left));
  background:rgba(18,10,6,0.97);
  border-bottom:1px solid rgba(244,234,215,0.1);
  flex-shrink:0;
}

#mob-list-head h1{
  font-size:1.2rem;
  font-weight:300;
  letter-spacing:0.15em;
  text-transform:uppercase;
  margin:0 0 10px;
  color:#f4ead7;
}

#mob-search{
  width:100%;
  box-sizing:border-box;
  padding:10px 14px;
  background:rgba(45,35,25,0.8);
  border:1px solid rgba(244,234,215,0.15);
  border-radius:10px;
  color:#f4ead7;
  font-size:1rem;
  outline:none;
  -webkit-appearance:none;
}

#mob-search::placeholder{color:rgba(244,234,215,0.35);}

#mob-list-scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:
    8px
    max(0px,env(safe-area-inset-right))
    max(16px,env(safe-area-inset-bottom))
    max(0px,env(safe-area-inset-left));
}

#mob-list-count{
  font-size:0.75rem;
  opacity:0.45;
  padding:8px 16px 4px;
  letter-spacing:0.08em;
}

.mob-item{
  display:flex;
  flex-direction:column;
  padding:14px 16px;
  border-bottom:1px solid rgba(244,234,215,0.08);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.mob-item:active{
  background:rgba(140,47,57,0.25);
}

.mob-item-title{
  font-size:1rem;
  font-weight:500;
  margin-bottom:3px;
}

.mob-item-meta{
  font-size:0.78rem;
  opacity:0.5;
}
#mob-reader{
  display:none;
  position:fixed;
  inset:0;
  z-index:9999;
  background:#18110c;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:0;
  color:#f4ead7;
  font-family:Georgia,'Times New Roman',serif;
}

#mob-reader-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:
    max(14px,env(safe-area-inset-top))
    max(16px,env(safe-area-inset-right))
    14px
    max(16px,env(safe-area-inset-left));
  background:rgba(18,10,6,0.97);
  border-bottom:1px solid rgba(244,234,215,0.1);
  position:sticky;
  top:0;
  z-index:1;
}

#mob-back-btn{
  background:#8c2f39;
  border:none;
  color:#f4ead7;
  font-size:1rem;
  font-weight:700;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

#mob-reader-title{
  font-size:0.8rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  opacity:0.55;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

#mob-reader-body{
  padding:
    28px
    max(20px,env(safe-area-inset-right))
    max(40px,env(safe-area-inset-bottom))
    max(20px,env(safe-area-inset-left));
  max-width:680px;
  margin:0 auto;
  line-height:1.85;
  font-size:1.15rem;
}

#mob-reader-body h1{
  color:#f3d7a0;
  font-size:1.5rem;
  margin:0 0 0.3em;
  line-height:1.3;
}

#mob-reader-body h2,
#mob-reader-body h3{
  color:#f3d7a0;
  margin:1.4em 0 0.5em;
}

#mob-reader-body p{
  margin-bottom:1.1em;
}

#mob-reader-body a{color:#f3d7a0;}

#mob-reader-body .meta{
  font-size:0.85rem;
  opacity:0.55;
  margin-bottom:2em;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
</style>
</head>

<body>

<!-- Mobile app mode: full-screen story list -->
<div id="mob-list-view">
  <div id="mob-list-head">
    <h1>Readers Retreat</h1>
    <input id="mob-search" type="search" placeholder="search stories…">
  </div>
  <div id="mob-list-scroll">
    <div id="mob-list-count"></div>
    <div id="mob-list-items"></div>
  </div>
</div>

<!-- Mobile full-screen reader overlay -->
<div id="mob-reader">
  <div id="mob-reader-bar">
    <button id="mob-back-btn" onclick="closeMobReader()">← Back</button>
    <span id="mob-reader-title"></span>
  </div>
  <div id="mob-reader-body"></div>
</div>

<div id="sidebar">
  <h1>norsiwel<br>readers retreat</h1>

  <button onclick="cloneRepo()" class="clone-btn">
    clone archive
  </button>

  <input id="search" placeholder="search...">

  <select id="sort">
    <option value="alpha">alphabetical</option>
    <option value="newest">newest</option>
    <option value="oldest">oldest</option>
    <option value="longest">longest</option>
    <option value="shortest">shortest</option>
    <option value="stories">stories only</option>
    <option value="pdfs">pdfs only</option>
    <option value="audio">audiobooks only</option>
  </select>

  <div id="count">loading...</div>
  <div id="list"></div>
</div>

<div id="reader">
  <div id="content">
    <h2>welcome</h2>
    <p>loading archive...</p>

    <div class="bot-links">
      <p>For simple crawlers and AI indexers:</p>
      <ul>
        <li><a href="archive.json">archive index json</a></li>
        <li><a href="stories/">stories folder</a></li>
        <li><a href="pdf/">pdf folder</a></li>
        <li><a href="audiobooks/">audiobooks folder</a></li>
      </ul>
    </div>
  </div>
</div>

<script>
const ARCHIVE="archive.json";

let data=[];
let active="";

function cloneRepo(){
  const command="git clone https://github.com/norsiwel/readers-retreat.git";

  if(navigator.clipboard){
    navigator.clipboard.writeText(command).then(()=>{
      alert("clone command copied:\\n\\n"+command);
    }).catch(()=>{
      alert("clone command:\\n\\n"+command);
    });
  }else{
    alert("clone command:\\n\\n"+command);
  }
}

function cleanTitle(path){
  return path.split("/").pop()
    .replace(/\.[^/.]+$/,"")
    .replace(/[-_]/g," ");
}

function readTime(item){
  if(!item.words)return"?";
  return Math.max(1,Math.ceil(item.words/225));
}

function itemTime(i){
  return Number(i.timestamp||0) ||
         Date.parse(i.updated||i.date||"") ||
         0;
}

function filteredSorted(){
  const q=document.getElementById("search").value.toLowerCase();
  const mode=document.getElementById("sort").value;

  let items=data.filter(i =>
    i.title.toLowerCase().includes(q) ||
    i.path.toLowerCase().includes(q) ||
    i.type.toLowerCase().includes(q)
  );

  if(mode==="stories")items=items.filter(i=>i.type==="story");
  if(mode==="pdfs")items=items.filter(i=>i.type==="pdf");
  if(mode==="audio")items=items.filter(i=>i.type==="audio" || i.type==="audiobook");

  if(mode==="alpha"||mode==="stories"||mode==="pdfs"||mode==="audio")
    items.sort((a,b)=>a.title.localeCompare(b.title));

  if(mode==="newest")
    items.sort((a,b)=>itemTime(b)-itemTime(a)||a.title.localeCompare(b.title));

  if(mode==="oldest")
    items.sort((a,b)=>itemTime(a)-itemTime(b)||a.title.localeCompare(b.title));

  if(mode==="longest")
    items.sort((a,b)=>b.size-a.size||a.title.localeCompare(b.title));

  if(mode==="shortest")
    items.sort((a,b)=>a.size-b.size||a.title.localeCompare(b.title));

  return items;
}

function render(){
  const items=filteredSorted();
  const list=document.getElementById("list");

  list.innerHTML="";
  document.getElementById("count").textContent =
    items.length+" of "+data.length;

  items.forEach(i=>{
    const el=document.createElement("div");
    el.className="item"+(i.path===active?" active":"");

    el.innerHTML=`
      <div>${i.title}</div>
      <div class="meta">
        ${
          i.type==="pdf" ? "pdf" :
          i.type==="audio" || i.type==="audiobook" ? "audiobook" :
          readTime(i)+" min"
        }
        ${i.date?" · "+i.date:""}
      </div>
    `;

    el.onclick=()=>openItem(i);
    list.appendChild(el);
  });
}

function home(){
  active="";

  const pdfs=data
    .filter(i=>i.type==="pdf")
    .sort((a,b)=>a.title.localeCompare(b.title));

  const audio=data
    .filter(i=>i.type==="audio" || i.type==="audiobook")
    .sort((a,b)=>a.title.localeCompare(b.title));

  document.getElementById("content").innerHTML=`
    <h2>welcome</h2>
    <p>select a story, pdf, or audiobook from the left.</p>

    <h2>graphic stories / pdf files</h2>

    ${
      pdfs.length
      ? `<ul class="file-list">
          ${pdfs.map(p=>`
            <li><a href="${encodeURI(p.path)}" target="_blank">${p.title}</a></li>
          `).join("")}
         </ul>`
      : `<p>no pdf files found.</p>`
    }

    <h2>audiobooks</h2>

    ${
      audio.length
      ? `<ul class="file-list">
          ${audio.map(a=>`
            <li><a href="${encodeURI(a.path)}" target="_blank">${a.title}</a></li>
          `).join("")}
         </ul>`
      : `<p>no audiobook files found.</p>`
    }

    <div class="bot-links">
      <p>Archive links for simple crawlers and AI indexers:</p>
      <ul>
        <li><a href="archive.json">archive index json</a></li>
        <li><a href="stories/">stories folder</a></li>
        <li><a href="pdf/">pdf folder</a></li>
        <li><a href="audiobooks/">audiobooks folder</a></li>
      </ul>
    </div>
  `;

  render();
}

async function openItem(item){
  active=item.path;
  render();

  if(item.type==="pdf" || item.type==="audio" || item.type==="audiobook"){
    window.open(encodeURI(item.path),"_blank");
    return;
  }

  try{
    const res=await fetch(encodeURI(item.path),{cache:"no-store"});
    if(!res.ok)throw new Error(res.status+" "+res.statusText);

    const text=await res.text();
    const html=`
      <h1 style="color:#f3d7a0;margin-bottom:0.3em;">${item.title}</h1>
      <p style="opacity:0.6;font-size:0.85rem;margin-bottom:1.5em;">${readTime(item)} min${item.date?" · "+item.date:""}</p>
      ${marked.parse(text)}
    `;

    /* If in mobile/app mode, open in full-screen reader overlay */
    var isMobApp=new URLSearchParams(location.search).has('app');
    if(isMobApp){
      document.getElementById('mob-reader-title').textContent=item.title;
      document.getElementById('mob-reader-body').innerHTML=html;
      var ov=document.getElementById('mob-reader');
      ov.style.display='block';
      ov.scrollTop=0;
      return;
    }

    document.getElementById("content").innerHTML=`
      <button onclick="home()">back</button>
      <h1>${item.title}</h1>
      <p>${readTime(item)} min${item.date?" · "+item.date:""}</p>
      ${marked.parse(text)}
    `;

  }catch(e){
    document.getElementById("content").innerHTML =
      "<p>could not load file</p>";
  }
}

function closeMobReader(){
  document.getElementById('mob-reader').style.display='none';
  document.getElementById('mob-reader').scrollTop=0;
}

async function init(){
  try{
    const res=await fetch(ARCHIVE,{cache:"no-store"});
    const raw=await res.json();

    data=raw.map(i=>({
      title:i.title||cleanTitle(i.path),
      path:i.path,
      type:i.type||"story",
      size:Number(i.size||0),
      words:Number(i.words||0),
      date:i.date||"",
      updated:i.updated||"",
      timestamp:Number(i.timestamp||0)
    }));

    home();
    if(isAppMode) mobRenderList();

  }catch(e){
    document.getElementById("content").innerHTML =
      "archive.json not found. run publish-all.sh";
  }
}

document.getElementById("search").oninput=render;
document.getElementById("sort").onchange=render;

/* ── Mobile app mode ── */
var isAppMode=new URLSearchParams(location.search).has('app');
if(isAppMode){
  document.body.classList.add('app-mode');
  document.getElementById('mob-list-view').style.display='flex';
}

function mobRenderList(){
  var q=document.getElementById('mob-search').value.toLowerCase();
  var sort=new URLSearchParams(location.search).get('sort')||'alpha';
  var items=data.filter(function(i){
    return i.title.toLowerCase().includes(q)||i.path.toLowerCase().includes(q);
  });
  if(sort==='stories') items=items.filter(function(i){return i.type==='story';});
  if(sort==='pdfs')    items=items.filter(function(i){return i.type==='pdf';});
  if(sort==='audio')   items=items.filter(function(i){return i.type==='audio'||i.type==='audiobook';});
  if(sort==='newest')  items.sort(function(a,b){return itemTime(b)-itemTime(a)||a.title.localeCompare(b.title);});
  else                 items.sort(function(a,b){return a.title.localeCompare(b.title);});

  document.getElementById('mob-list-count').textContent=items.length+' stories';
  var el=document.getElementById('mob-list-items');
  el.innerHTML='';
  items.forEach(function(i){
    var d=document.createElement('div');
    d.className='mob-item';
    d.innerHTML='<div class="mob-item-title">'+i.title+'</div>'
      +'<div class="mob-item-meta">'
      +(i.type==='pdf'?'pdf':i.type==='audio'||i.type==='audiobook'?'audiobook':readTime(i)+' min')
      +(i.date?' · '+i.date:'')
      +'</div>';
    d.onclick=function(){openItem(i);};
    el.appendChild(d);
  });
}

document.getElementById('mob-search').oninput=mobRenderList;

init();
</script>

<script data-goatcounter="https://norsiwel.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<!-- PWA: service worker + sort-param handler for mobile launcher buttons -->
<script>
(function(){
  if('serviceWorker'in navigator) navigator.serviceWorker.register('./sw.js');

  var p=new URLSearchParams(location.search);
  var sort=p.get('sort');
  if(sort){
    var el=document.getElementById('sort');
    var ok=['alpha','newest','oldest','longest','shortest','stories','pdfs','audio'];
    if(el&&ok.indexOf(sort)>=0) el.value=sort;
  }

  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    window._pwaPrompt=e;
  });
})();
</script>

</body>
</html>
