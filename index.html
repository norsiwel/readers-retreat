<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Norsiwel's Readers Retreat</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Lato&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --sidebar-bg: #eadbb8;
    --accent: #8c2f39;
    --text-light: #f4ead7;
}

body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: 'Lato', sans-serif;
}

/* Sidebar */
#sidebar {
    width: 320px;
    background: var(--sidebar-bg);
    padding: 20px;
    overflow-y: auto;
}

#sidebar h1 {
    font-family: 'Merriweather', serif;
    color: var(--accent);
}

/* Reader (main area) */
#reader {
    flex-grow: 1;
    padding: 60px;
    overflow-y: auto;

    background-image:
        linear-gradient(rgba(20,12,8,0.4), rgba(20,12,8,0.4)),
        url('library-bg.png');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Text content */
#content-display {
    max-width: 800px;
    margin: auto;
    font-family: 'Merriweather', serif;
    font-size: 1.2rem;
    line-height: 1.8;
    color: var(--text-light);
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
}

/* Graphic Stories */
.graphic-stories-grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 30px;
}

.graphic-story-card {
    width: 180px;
    text-decoration: none;
    color: var(--text-light);
}

.graphic-story-card img {
    width: 100%;
    height: 110px;
    object-fit: cover;
    border-radius: 4px;
}

.card-title {
    margin-top: 6px;
    font-weight: bold;
}

.card-meta {
    font-size: 0.8rem;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
    <h1>Norsiwel's Readers Retreat</h1>
    <p>The Complete Archives</p>
</div>

<!-- Reader -->
<div id="reader">
    <div id="content-display">

        <p style="text-align:center; margin-top:40px;">
        <em>"A story is a letter that the author writes to himself..."</em>
        </p>

        <h2 style="text-align:center; margin-top:40px;">Graphic Stories</h2>

        <div class="graphic-stories-grid" id="graphic-stories-grid"></div>

    </div>
</div>

<script>
async function loadGraphicStories() {
    const grid = document.getElementById('graphic-stories-grid');

    try {
        const res = await fetch('graphic-stories.json');
        const stories = await res.json();

        grid.innerHTML = stories.map(s => `
            <a class="graphic-story-card" href="${s.pdf}" target="_blank">
                <img src="${s.cover}">
                <div class="card-title">${s.title}</div>
                <div class="card-meta">${s.meta}</div>
            </a>
        `).join('');
    } catch (e) {
        grid.innerHTML = '<p>Graphic stories unavailable</p>';
    }
}

loadGraphicStories();
</script>

</body>
</html>
